version: "3.8"

services:
  scylla-1:
    image: scylladb/scylla:6.0.2
    container_name: scylla-1
    ports:
      - "9042:9042"
    healthcheck:
      test:
        - CMD-SHELL
        - |
          HOST="$$(hostname -i | awk '{print $$1}')";
          cqlsh -u "$$SCYLLA_INIT_USER" -p "$$SCYLLA_INIT_PASSWORD" -e 'DESCRIBE CLUSTER' "$$HOST" 9042 >/dev/null 2>&1 ||
          cqlsh -u "$$SCYLLA_USER" -p "$$SCYLLA_PASSWORD" -e 'DESCRIBE CLUSTER' "$$HOST" 9042 >/dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 15
    env_file: 
      - .env
      - .env.secrets

  scylla-2:
    image: scylladb/scylla:6.0.2
    container_name: scylla-2
    ports:
      - "9043:9042"
    env_file: 
      - .env
      - .env.secrets

  scylla-3:
    image: scylladb/scylla:6.0.2
    container_name: scylla-3
    ports:
      - "9044:9042"
    env_file: 
      - .env
      - .env.secrets

  scylla-init:
    image: scylladb/scylla:6.0.2
    container_name: scylla-init
    depends_on:
      scylla-1:
        condition: service_healthy
    volumes:
      - ./scripts/init.cql:/init.cql
      - scylla-init-state:/state
    env_file: 
      - .env
      - .env.secrets
    entrypoint:
      - sh
      - -c
      - |
        if [ -f /state/init.done ]; then
          echo "[scylla-init] init already done, skip.";
          exit 0;
        fi;
        echo "[scylla-init] running init.cql...";
        touch /state/init.done;
        cqlsh -u "$$SCYLLA_INIT_USER" -p "$$SCYLLA_INIT_PASSWORD" scylla-1 -f /init.cql;

volumes:
  scylla-init-state:
